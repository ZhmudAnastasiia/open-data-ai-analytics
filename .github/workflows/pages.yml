name: Deploy visualization to GitHub Pages

on:
  workflow_run:
    workflows: ["CI per module"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          pip install jupyter nbconvert

      - name: Build site (execute notebook -> index.html)
        run: |
          set -euo pipefail
          mkdir -p _site
          jupyter nbconvert \
            --execute notebooks/visualization.ipynb \
            --to html \
            --output index.html \
            --output-dir _site

          if [ -d artifacts ]; then cp -r artifacts _site/ || true; fi
          if [ -d reports/figures ]; then cp -r reports/figures _site/figures || true; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4