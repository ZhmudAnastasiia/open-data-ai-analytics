name: CI (self-hosted)

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module to run on self-hosted"
        required: true
        type: choice
        default: data
        options:
          - data
          - visualization

jobs:
  selfhosted:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Windows PowerShell)
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install jupyter nbconvert

      - name: Create artifacts dir
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

      - name: Run selected module
        shell: powershell
        run: |
          if ("${{ inputs.module }}" -eq "data") {
            python src\load_data.py | Tee-Object -FilePath artifacts\selfhosted.log
          }
          else {
            jupyter nbconvert --execute notebooks\visualization.ipynb --to html `
              --output visualization-selfhosted.html --output-dir artifacts `
              | Tee-Object -FilePath artifacts\selfhosted.log
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-selfhosted-${{ inputs.module }}
          path: artifacts/
          if-no-files-found: warn